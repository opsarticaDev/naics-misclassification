<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 6: Flag Rate by Establishment Size</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; display: flex; justify-content: center; padding: 40px 20px; }
  .container { width: 900px; }

  .chart-wrap { position: relative; width: 100%; height: 480px; }
  .footnote { font-size: 12px; color: #666; line-height: 1.6; margin-top: 16px; padding: 12px; background: #f7f9fb; border-radius: 6px; }
  @media print { body { padding: 0; } .container { width: 100%; } }
</style>
</head>
<body>
<div class="container">

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>
  <div class="footnote">
    <strong>Key finding:</strong> Establishments with 500+ employees are flagged at ~76% compared to ~44% for those under 10 employees. This 32-percentage-point gap is remarkably consistent across all 4 years, suggesting that establishment size is a strong structural predictor of NAICS complexity.
  </div>
</div>
<script>
const ctx = document.getElementById('chart').getContext('2d');

const data = {
  labels: ['<10', '10-49', '50-249', '250-499', '500+'],
  datasets: [
    {
      label: '2021',
      data: [47.25, 50.60, 56.34, 69.53, 75.88],
      backgroundColor: '#2C5F8A',
      borderColor: '#1A3A5C',
      borderWidth: 1
    },
    {
      label: '2022',
      data: [41.17, 47.54, 58.04, 69.38, 75.51],
      backgroundColor: '#D4A843',
      borderColor: '#b8922e',
      borderWidth: 1
    },
    {
      label: '2023',
      data: [42.92, 47.08, 56.04, 68.05, 76.32],
      backgroundColor: '#4A8C6F',
      borderColor: '#357a5a',
      borderWidth: 1
    },
    {
      label: '2024',
      data: [45.95, 48.35, 57.24, 67.68, 75.72],
      backgroundColor: '#C44E52',
      borderColor: '#a33b3f',
      borderWidth: 1
    }
  ]
};

new Chart(ctx, {
  type: 'bar',
  data: data,
  plugins: [ChartDataLabels],
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        position: 'top',
        labels: { font: { size: 13 }, padding: 20, usePointStyle: true, pointStyleWidth: 16 }
      },
      datalabels: {
        color: '#333',
        font: { weight: 'bold', size: 10 },
        anchor: 'end',
        align: 'top',
        offset: -2,
        formatter: function(value) {
          return value.toFixed(1) + '%';
        }
      },
      tooltip: {
        callbacks: {
          label: function(context) {
            return context.dataset.label + ': ' + context.raw.toFixed(1) + '%';
          }
        }
      }
    },
    scales: {
      x: {
        grid: { display: false },
        title: { display: true, text: 'Annual Average Employees', font: { size: 13 } },
        ticks: { font: { size: 13, weight: '600' } }
      },
      y: {
        beginAtZero: true,
        max: 85,
        title: { display: true, text: 'Flag Rate (%)', font: { size: 13 } },
        ticks: {
          callback: function(val) { return val + '%'; },
          font: { size: 12 }
        }
      }
    }
  }
});
</script>
</body>
</html>
