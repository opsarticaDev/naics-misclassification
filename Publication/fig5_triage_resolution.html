<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figure 5: Triage Resolution Summary</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; display: flex; justify-content: center; padding: 40px 20px; }
  .container { width: 900px; }

  .donut-wrap { position: relative; width: 100%; height: 340px; margin-bottom: 16px; }
  .bar-wrap { position: relative; width: 100%; height: 420px; }
  @media print { body { padding: 0; } .container { width: 100%; } }
</style>
</head>
<body>
<div class="container">
  <div class="part-label">A. Resolution Outcome</div>
  <div class="donut-wrap">
    <canvas id="donut"></canvas>
  </div>

  <div class="part-label">B. Tier Breakdown (4-Year Aggregate)</div>
  <div class="bar-wrap">
    <canvas id="bars"></canvas>
  </div>
</div>
<script>
// Part A: Donut
const donutCtx = document.getElementById('donut').getContext('2d');
new Chart(donutCtx, {
  type: 'doughnut',
  data: {
    labels: ['Auto-Resolved (96.6%)', 'Manual Review (1.8%)', 'No Data (1.6%)'],
    datasets: [{
      data: [156494, 2987, 2591],
      backgroundColor: ['#4A8C6F', '#C44E52', '#7F7F7F'],
      borderColor: '#fff',
      borderWidth: 3,
      hoverOffset: 8
    }]
  },
  plugins: [ChartDataLabels, {
    id: 'centerText',
    beforeDraw: function(chart) {
      const { ctx, chartArea } = chart;
      if (!chartArea) return;
      ctx.save();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = (chartArea.left + chartArea.right) / 2;
      const cy = (chartArea.top + chartArea.bottom) / 2;
      ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText('162,072', cx, cy - 10);
      ctx.font = '13px -apple-system, BlinkMacSystemFont, sans-serif';
      ctx.fillStyle = '#777';
      ctx.fillText('triage records', cx, cy + 14);
      ctx.restore();
    }
  }],
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: '58%',
    plugins: {
      legend: {
        position: 'right',
        labels: { font: { size: 13 }, padding: 16, usePointStyle: true }
      },
      datalabels: {
        color: '#fff',
        font: { weight: 'bold', size: 14 },
        formatter: function(value) { return value.toLocaleString(); }
      }
    }
  }
});

// Part B: Horizontal bar chart
const tierLabels = ['T3','T5b','T1','T2b','T0','T4','T5','T2','T5e','T5d','T5f','T6','T7a','T5c'];
const tierCounts = [78273,24019,18176,15847,14538,2921,2591,1987,1558,723,640,529,260,10];
const tierDescs = [
  'Desc supports reported',
  'No desc signal',
  'Classifier agrees',
  'Multi-estab consistent',
  'Confirmed correct',
  'Same sector, diff sub-code',
  'No data (unreachable)',
  'Minor NAICS revision',
  'Website unscrapeable',
  'Low confidence guess',
  'No NAICS signal from web',
  'Cross-sector contradiction',
  'Invalid code w/ alternative',
  'Non-credible URL'
];
// Color: green=auto, gray=nodata, red=human
const autoTiers = ['T0','T1','T2','T2b','T3','T4','T5b','T5c','T5d'];
const humanTiers = ['T5e','T5f','T6','T7a'];
const tierColors = tierLabels.map(t => {
  if (autoTiers.includes(t)) return '#4A8C6F';
  if (humanTiers.includes(t)) return '#C44E52';
  return '#7F7F7F';
});

const barCtx = document.getElementById('bars').getContext('2d');
new Chart(barCtx, {
  type: 'bar',
  data: {
    labels: tierLabels.map((t, i) => t + ' - ' + tierDescs[i]),
    datasets: [{
      data: tierCounts,
      backgroundColor: tierColors,
      borderColor: tierColors.map(c => c === '#4A8C6F' ? '#357a58' : c === '#C44E52' ? '#a33b3f' : '#666'),
      borderWidth: 1
    }]
  },
  plugins: [ChartDataLabels],
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      datalabels: {
        anchor: 'end',
        align: 'right',
        offset: 4,
        color: '#333',
        font: { size: 11, weight: '600' },
        formatter: function(v) { return v.toLocaleString(); }
      }
    },
    scales: {
      x: {
        beginAtZero: true,
        title: { display: true, text: '4-Year Aggregate Count', font: { size: 12 } },
        ticks: {
          callback: function(v) { return v >= 1000 ? (v/1000) + 'K' : v; },
          font: { size: 11 }
        },
        grid: { color: 'rgba(0,0,0,0.06)' }
      },
      y: {
        ticks: { font: { size: 11 } },
        grid: { display: false }
      }
    },
    layout: { padding: { right: 60 } }
  }
});
</script>
</body>
</html>
